<!DOCTYPE html>
<html>
<head>
    <title>Login - FarmSeva</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #2e7d32, #66bb6a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 100%;
        }

        .btn-success {
            background: #2e7d32;
            border: none;
        }

        .btn-success:hover {
            background: #1b5e20;
        }

        .btn-success:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .text-success {
            color: #2e7d32 !important;
        }

        .text-danger {
            color: #d32f2f !important;
        }

        .form-control:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 0 0.2rem rgba(46, 125, 50, 0.25);
        }

        #passwordSection {
            display: none;
        }

        .loading {
            display: none;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2 class="text-center mb-4">🌱 Login to FarmSeva</h2>

    <form id="loginForm">
        <div class="mb-3">
            <label for="phone" class="form-label">Phone Number <span class="text-danger">*</span></label>
            <input type="tel" class="form-control" id="phone" placeholder="Enter 10-digit phone number" required>
        </div>

        <div id="passwordSection" class="mb-3">
            <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
            <input type="password" class="form-control" id="password" placeholder="Enter your password">
        </div>

        <div class="mb-3 d-grid">
            <button type="submit" id="loginButton" class="btn btn-success btn-lg">
                <span class="login-text">Login</span>
                <span class="loading"><i class="fas fa-spinner fa-spin"></i> Logging in...</span>
            </button>
        </div>
    </form>

    <div id="message" class="text-center mt-3 text-danger" style="display: none;"></div>

    <p class="text-center mt-3">
        Don't have an account? <a href="register.html" class="text-success">Register here</a>
    </p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = 'http://localhost:8000/api';

    const loginForm = document.getElementById('loginForm');
    const loginButton = document.getElementById('loginButton');
    const messageBox = document.getElementById('message');
    const phoneInput = document.getElementById('phone');
    const passwordInput = document.getElementById('password');
    const passwordSection = document.getElementById('passwordSection');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const phone = phoneInput.value.trim();
        const password = passwordInput.value.trim();

        // Validation
        if (!phone) {
            showMessage('Please enter your phone number', true);
            return;
        }

        if (phone.length !== 10 || isNaN(phone)) {
            showMessage('Please enter a valid 10-digit phone number', true);
            return;
        }

        if (!password) {
            showMessage('Please enter your password', true);
            return;
        }

        // Show loading
        loginButton.disabled = true;
        loginButton.querySelector('.login-text').style.display = 'none';
        loginButton.querySelector('.loading').style.display = 'inline';

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    phone,
                    password
                })
            });

            const data = await response.json();

            if (data.success) {
                // Save token and user data
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.farmer));
                
                showMessage('✓ Login successful! Redirecting...', false);
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                showMessage(data.message || 'Login failed', true);
            }
        } catch (error) {
            showMessage('Error: ' + error.message, true);
        } finally {
            loginButton.disabled = false;
            loginButton.querySelector('.login-text').style.display = 'inline';
            loginButton.querySelector('.loading').style.display = 'none';
        }
    });

    function showMessage(text, isError) {
        messageBox.textContent = text;
        messageBox.className = isError ? 'text-center mt-3 text-danger' : 'text-center mt-3 text-success';
        messageBox.style.display = 'block';
    }

    // Show password field on form load
    window.addEventListener('load', () => {
        passwordSection.style.display = 'block';
    });
</script>

</body>
</html>
