<!DOCTYPE html>
<html>
<head>
    <title>Register - FarmSeva</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #2e7d32, #66bb6a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        .btn-success {
            background: #2e7d32;
            border: none;
        }

        .btn-success:hover {
            background: #1b5e20;
        }

        .text-success {
            color: #2e7d32 !important;
        }

        .text-danger {
            color: #d32f2f !important;
        }

        .form-control:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 0 0.2rem rgba(46, 125, 50, 0.25);
        }

        .loading {
            display: none;
        }
    </style>
</head>

<body>

<div class="register-card">
    <h2 class="text-center mb-4">🌱 Register for FarmSeva</h2>

    <form id="registerForm">
        <!-- Personal Details -->
        <h5 class="mb-3 text-success">Personal Details</h5>
        
        <div class="mb-3">
            <label for="name" class="form-label">Full Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="Enter your email (optional)">
        </div>

        <div class="mb-3">
            <label for="phone" class="form-label">Phone Number <span class="text-danger">*</span></label>
            <input type="tel" class="form-control" id="phone" placeholder="Enter 10-digit phone number" required>
        </div>

        <div class="mb-3">
            <label for="aadhar" class="form-label">Aadhaar Number <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="aadhar" placeholder="Enter 12-digit Aadhaar number" maxlength="12" required>
        </div>

        <!-- Farm Details -->
        <h5 class="mb-3 mt-4 text-success">Farm Details</h5>

        <div class="mb-3">
            <label for="state" class="form-label">State</label>
            <input type="text" class="form-control" id="state" placeholder="Enter your state">
        </div>

        <div class="mb-3">
            <label for="district" class="form-label">District</label>
            <input type="text" class="form-control" id="district" placeholder="Enter your district">
        </div>

        <div class="mb-3">
            <label for="village" class="form-label">Village</label>
            <input type="text" class="form-control" id="village" placeholder="Enter your village">
        </div>

        <div class="mb-3">
            <label for="landArea" class="form-label">Land Area (in acres)</label>
            <input type="number" class="form-control" id="landArea" placeholder="Enter land area" step="0.01">
        </div>

        <div class="mb-3">
            <label for="cropType" class="form-label">Primary Crop</label>
            <select class="form-control" id="cropType">
                <option value="">Select a crop</option>
                <option value="Rice">Rice</option>
                <option value="Wheat">Wheat</option>
                <option value="Corn">Corn</option>
                <option value="Cotton">Cotton</option>
                <option value="Sugarcane">Sugarcane</option>
                <option value="Pulses">Pulses</option>
                <option value="Vegetables">Vegetables</option>
                <option value="Fruits">Fruits</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <!-- Password -->
        <h5 class="mb-3 mt-4 text-success">Security</h5>

        <div class="mb-3">
            <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
            <input type="password" class="form-control" id="password" placeholder="Enter a strong password" required>
        </div>

        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirm Password <span class="text-danger">*</span></label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
        </div>

        <!-- Submit Button -->
        <div class="mb-3 d-grid">
            <button type="submit" id="registerButton" class="btn btn-success btn-lg">
                <span class="register-text">Register</span>
                <span class="loading"><i class="fas fa-spinner fa-spin"></i> Registering...</span>
            </button>
        </div>
    </form>

    <div id="message" class="text-center mt-3 text-danger" style="display: none;"></div>

    <p class="text-center mt-3">
        Already have an account? <a href="login.html" class="text-success">Login here</a>
    </p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = 'http://localhost:8000/api';

    const registerForm = document.getElementById('registerForm');
    const registerButton = document.getElementById('registerButton');
    const messageBox = document.getElementById('message');

    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const aadhar = document.getElementById('aadhar').value.trim();
        const state = document.getElementById('state').value.trim();
        const district = document.getElementById('district').value.trim();
        const village = document.getElementById('village').value.trim();
        const landArea = document.getElementById('landArea').value;
        const cropType = document.getElementById('cropType').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Validation
        if (!name || !phone || !aadhar || !password) {
            showMessage('Please fill all required fields', true);
            return;
        }

        if (phone.length !== 10 || isNaN(phone)) {
            showMessage('Please enter a valid 10-digit phone number', true);
            return;
        }

        if (aadhar.length !== 12 || isNaN(aadhar)) {
            showMessage('Please enter a valid 12-digit Aadhaar number', true);
            return;
        }

        if (password.length < 6) {
            showMessage('Password must be at least 6 characters', true);
            return;
        }

        if (password !== confirmPassword) {
            showMessage('Passwords do not match', true);
            return;
        }

        // Show loading
        registerButton.disabled = true;
        registerButton.querySelector('.register-text').style.display = 'none';
        registerButton.querySelector('.loading').style.display = 'inline';

        try {
            const response = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    name,
                    email,
                    phone,
                    aadhaar: aadhar,
                    state,
                    district,
                    village,
                    landArea: landArea ? parseFloat(landArea) : null,
                    cropType,
                    password
                })
            });

            const data = await response.json();

            if (data.success) {
                showMessage('✓ Registration successful! Redirecting to login...', false);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                showMessage(data.message || 'Registration failed', true);
            }
        } catch (error) {
            showMessage('Error: ' + error.message, true);
        } finally {
            registerButton.disabled = false;
            registerButton.querySelector('.register-text').style.display = 'inline';
            registerButton.querySelector('.loading').style.display = 'none';
        }
    });

    function showMessage(text, isError) {
        messageBox.textContent = text;
        messageBox.className = isError ? 'text-center mt-3 text-danger' : 'text-center mt-3 text-success';
        messageBox.style.display = 'block';
    }
</script>

</body>
</html>
