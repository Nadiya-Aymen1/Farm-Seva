<!DOCTYPE html>
<html>
<head>
    <title>Subsidy Application - FarmSeva</title>

    <style>
        body{
            margin:0;
            font-family:Poppins,sans-serif;
            background:linear-gradient(135deg,#e8f5e9,#ffffff);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:100%;
            max-width:550px;
            padding:20px;
        }

        .card{
            background:white;
            border-radius:24px;
            padding:32px;
            box-shadow:0 20px 50px rgba(0,0,0,0.08);
        }

        h1{
            color:#2e7d32;
            margin-bottom:10px;
            text-align:center;
        }

        p{
            text-align:center;
            color:#555;
            margin-bottom:30px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
            margin-bottom:18px;
        }

        label{
            margin-bottom:8px;
            font-weight:600;
        }

        input,select,textarea{
            padding:14px;
            border-radius:14px;
            border:1px solid #d7d7d7;
            font-size:16px;
            outline:none;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:16px;
            background:#2e7d32;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#1b5e20;
        }

        #message{
            margin-top:18px;
            text-align:center;
            font-weight:600;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Subsidy Application</h1>

        <p>Fill the details to apply for subsidy</p>

        <div class="form-group">
            <label>Farmer Name</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="Enter phone number">
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" id="location" placeholder="Village, State">
        </div>

        <div class="form-group">
            <label>Farm Size</label>
            <input type="text" id="farmSize" placeholder="e.g. 10 acres">
        </div>

        <div class="form-group">
            <label>Subsidy Type</label>

            <select id="subsidyType">
                <option value="Seed Subsidy">Seed Subsidy</option>
                <option value="Equipment Subsidy">Equipment Subsidy</option>
                <option value="Irrigation Subsidy">Irrigation Subsidy</option>
                <option value="Fertilizer Subsidy">Fertilizer Subsidy</option>
            </select>
        </div>

        <div class="form-group">
            <label>Description</label>

            <textarea id="description" rows="4"
            placeholder="Enter details"></textarea>
        </div>

        <button id="submitBtn">
            Submit Application
        </button>

        <div id="message"></div>

    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    doc,
    setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyAGU2mzJxu_vwQ-8g6lnMdUhMBc9M6rA_c",

    authDomain: "farm-seva-1c9cd.firebaseapp.com",

    projectId: "farm-seva-1c9cd",

    storageBucket: "farm-seva-1c9cd.firebasestorage.app",

    messagingSenderId: "497776728271",

    appId: "1:497776728271:web:025dc1ae4b14164a72ffba"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const currentUser = JSON.parse(
    localStorage.getItem("currentUser")
);

const message = document.getElementById("message");

document
.getElementById("submitBtn")
.addEventListener("click", submitApplication);

async function submitApplication(){

    if(!currentUser || !currentUser.uid){

        message.innerText = "Please login first";
        message.style.color = "red";
        return;
    }

    const applicationData = {

        uid: currentUser.uid,

        name: document.getElementById("name").value,

        phone: document.getElementById("phone").value,

        location: document.getElementById("location").value,

        farmSize: document.getElementById("farmSize").value,

        subsidyType: document.getElementById("subsidyType").value,

        description: document.getElementById("description").value,

        status: "Pending",

        createdAt: new Date().toISOString()
    };

    try{

        await setDoc(
            doc(db,"subsidyApplications",currentUser.uid),
            applicationData
        );

        message.innerText =
        "✅ Application submitted successfully";

        message.style.color = "green";

        setTimeout(()=>{

            window.location.href = "trackstatus.html";

        },1500);

    }
    catch(error){

        console.log(error);

        message.innerText =
        "❌ Error submitting application";

        message.style.color = "red";
    }
}

</script>

</body>
</html>
