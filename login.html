<!DOCTYPE html>
<html>
<head>
    <title>Login - FarmSeva</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #2e7d32, #66bb6a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 100%;
        }

        .btn-success {
            background: #2e7d32;
            border: none;
        }

        .btn-success:hover {
            background: #1b5e20;
        }

        #otpSection {
            display: none;
        }

        #recaptcha-container {
            margin-top: 10px;
        }

        .message {
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
        }

        .message.error {
            color: #d32f2f;
        }

        .message.success {
            color: #2e7d32;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2 class="text-center mb-4">🌱 Login to FarmSeva</h2>

    <form id="loginForm">
        <div class="mb-3">
            <label for="phone" class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" placeholder="+911234567890" required>
        </div>

        <div class="mb-3 d-grid">
            <button type="button" id="sendOtpButton" class="btn btn-success">Send OTP</button>
        </div>

        <div id="otpSection" class="mb-3">
            <label for="otp" class="form-label">Enter OTP</label>
            <input type="text" class="form-control" id="otp" placeholder="6-digit OTP" maxlength="6">
        </div>

        <div id="otpSection" class="mb-3 d-grid">
            <button type="button" id="verifyOtpButton" class="btn btn-success">Verify OTP & Login</button>
        </div>
    </form>

    <div id="message" class="message"></div>

    <p class="text-center mt-3">
        Don't have an account? <a href="register.html">Register here</a>
    </p>
</div>

<div id="recaptcha-container"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: 'AIzaSyCkopUkoJjkYPey0BctjdglAiBHQlRPQjo',
        authDomain: 'farm-seva-1c9cd.firebaseapp.com',
        projectId: 'farm-seva-1c9cd',
        storageBucket: 'farm-seva-1c9cd.firebasestorage.app',
        messagingSenderId: '497776728271',
        appId: '1:497776728271:web:025dc1ae4b14164a72ffba',
        measurementId: 'G-44DNTWGEE6'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let confirmationResult = null;

    const sendOtpButton = document.getElementById('sendOtpButton');
    const verifyOtpButton = document.getElementById('verifyOtpButton');
    const otpSection = document.getElementById('otpSection');
    const messageBox = document.getElementById('message');

    function showMessage(text, isError = true) {
        messageBox.textContent = text;
        messageBox.classList.toggle('error', isError);
        messageBox.classList.toggle('success', !isError);
    }

    function resetMessage() {
        messageBox.textContent = '';
    }

    function validatePhone(phone) {
        return /^\+\d{10,15}$/.test(phone);
    }

    function initializeRecaptcha() {
        if (!window.recaptchaVerifier) {
            window.recaptchaVerifier = new RecaptchaVerifier('recaptcha-container', {
                size: 'normal',
                callback: () => {
                    // reCAPTCHA solved
                }
            }, auth);
            window.recaptchaVerifier.render();
        }
    }

    async function sendOtp() {
        resetMessage();
        
        let phone = document.getElementById('phone').value.trim();

        if (!phone) {
            showMessage('Please enter your phone number.');
            return;
        }

        if (!phone.startsWith('+')) {
            phone = '+91' + phone;
        }

        if (!validatePhone(phone)) {
            showMessage('Enter a valid phone number with country code, e.g. +911234567890.');
            return;
        }

        initializeRecaptcha();
        let verifier = window.recaptchaVerifier;

        try {
            confirmationResult = await signInWithPhoneNumber(auth, phone, verifier);
            otpSection.style.display = 'block';
            showMessage('OTP sent successfully. Enter the code below.', false);
            sendOtpButton.disabled = true;
        } catch (error) {
            console.error('Error sending OTP:', error);
            showMessage('Failed to send OTP. Check the phone number and Firebase configuration.');
            if (window.recaptchaVerifier) {
                window.recaptchaVerifier.clear();
                window.recaptchaVerifier = null;
            }
        }
    }

    async function verifyOtpAndLogin() {
        resetMessage();

        let phone = document.getElementById('phone').value.trim();
        const otp = document.getElementById('otp').value.trim();

        if (!phone.startsWith('+')) {
            phone = '+91' + phone;
        }

        if (!confirmationResult) {
            showMessage('Please send OTP first.');
            return;
        }

        if (!otp || otp.length !== 6) {
            showMessage('Please enter the 6-digit OTP sent to your phone.');
            return;
        }

        try {
            const result = await confirmationResult.confirm(otp);
            const user = result.user;

            // Get user details from Firestore
            const userDocRef = doc(db, 'users', user.uid);
            const userDoc = await getDoc(userDocRef);

            if (userDoc.exists()) {
                const userData = userDoc.data();
                localStorage.setItem('currentUser', JSON.stringify({
                    uid: user.uid,
                    name: userData.name,
                    phoneNumber: userData.phoneNumber,
                    aadhar: userData.aadhar
                }));

                showMessage('Login successful! Redirecting...', false);
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);
            } else {
                showMessage('User data not found. Please register first.');
            }
        } catch (error) {
            console.error('Error verifying OTP:', error);
            showMessage('Invalid OTP or verification failed. Please try again.');
        }
    }

    sendOtpButton.addEventListener('click', sendOtp);
    verifyOtpButton.addEventListener('click', verifyOtpAndLogin);
</script>

</body>
</html>
