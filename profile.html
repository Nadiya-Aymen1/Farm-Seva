<!DOCTYPE html>
<html>
<head>
    <title>FarmSeva Profile</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #ffffff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page {
            width: 100%;
            max-width: 520px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            padding: 32px;
            text-align: center;
        }

        .card h1 {
            margin: 0 0 12px;
            color: #2e7d32;
            font-size: 32px;
        }

        .card p {
            margin: 0 0 28px;
            color: #4b4b4b;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            border: 1px solid #d7d7d7;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 16px;
            outline: none;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }

        .button-row button {
            border: none;
            border-radius: 16px;
            padding: 14px 28px;
            font-size: 16px;
            cursor: pointer;
        }

        .button-save {
            background: #2e7d32;
            color: white;
        }

        .button-logout {
            background: #f5f5f5;
            color: #333;
        }

        .message {
            margin-top: 18px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="page">
    <div class="card">

        <h1>Farmer Profile</h1>

        <p>Edit your profile details below.</p>

        <form id="profileForm">

            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label>Farm Size</label>
                <input type="text" id="farmSize" placeholder="e.g. 10 acres">
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" id="location" placeholder="Village, State">
            </div>

            <div class="button-row">
                <button type="button" class="button-save" id="saveButton">
                    Save Profile
                </button>

                <button type="button" class="button-logout" id="logoutButton">
                    Logout
                </button>
            </div>

        </form>

        <div class="message" id="statusMessage"></div>

    </div>
</div>

<script type="module">

import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';

import {
    getFirestore,
    doc,
    getDoc,
    setDoc
} from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

const firebaseConfig = {
    apiKey: "AIzaSyAGU2mzJxu_vwQ-8g6lnMdUhMBc9M6rA_c",
    authDomain: "farm-seva-1c9cd.firebaseapp.com",
    projectId: "farm-seva-1c9cd",
    storageBucket: "farm-seva-1c9cd.firebasestorage.app",
    messagingSenderId: "497776728271",
    appId: "1:497776728271:web:025dc1ae4b14164a72ffba"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const currentUser = JSON.parse(
    localStorage.getItem("currentUser")
);

const nameInput = document.getElementById("name");

const farmSizeInput = document.getElementById("farmSize");

const locationInput = document.getElementById("location");

const statusMessage = document.getElementById("statusMessage");

async function loadProfile() {

    if (!currentUser || !currentUser.uid) {
        statusMessage.innerText = "Please login first";
        return;
    }

    try {

        const docRef = doc(db, "users", currentUser.uid);

        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {

            const data = docSnap.data();

            nameInput.value = data.name || "";

            farmSizeInput.value = data.farmSize || "";

            locationInput.value = data.location || "";
        }

    } catch (error) {

        console.log(error);

    }
}

async function saveProfile() {

    if (!currentUser || !currentUser.uid) {

        statusMessage.innerText = "User not logged in";

        return;
    }

    const profileData = {

        uid: currentUser.uid,

        name: nameInput.value,

        farmSize: farmSizeInput.value,

        location: locationInput.value,

        updatedAt: new Date().toISOString()
    };

    try {

        await setDoc(
            doc(db, "users", currentUser.uid),
            profileData,
            { merge: true }
        );

        localStorage.setItem(
            "currentUser",
            JSON.stringify({
                ...currentUser,
                name: nameInput.value
            })
        );

        statusMessage.innerText =
            "✅ Profile saved successfully";

        statusMessage.style.color = "green";

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);

    } catch (error) {

        console.log(error);

        statusMessage.innerText =
            "❌ Error saving profile";

        statusMessage.style.color = "red";
    }
}

function logout() {

    localStorage.removeItem("currentUser");

    window.location.href = "login.html";
}

document
.getElementById("saveButton")
.addEventListener("click", saveProfile);

document
.getElementById("logoutButton")
.addEventListener("click", logout);

loadProfile();

</script>

</body>
</html>
