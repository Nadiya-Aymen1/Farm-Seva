<!DOCTYPE html>
<html>
<head>
    <title>Register - FarmSeva</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #2e7d32, #66bb6a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 100%;
        }

        .btn-success {
            background: #2e7d32;
            border: none;
        }

        .btn-success:hover {
            background: #1b5e20;
        }

        #otpSection {
            display: none;
        }

        #recaptcha-container {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="register-card">
    <h2 class="text-center mb-4">🌱 Register for FarmSeva</h2>

    <form id="registerForm">
        <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" required>
        </div>

        <div class="mb-3">
            <label for="phone" class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" placeholder="+911234567890" required>
        </div>

        <div class="mb-3">
            <label for="aadhar" class="form-label">Aadhaar Number</label>
            <input type="text" class="form-control" id="aadhar" placeholder="123412341234" maxlength="12" required>
        </div>

        <div class="mb-3 d-grid">
            <button type="button" id="sendOtpButton" class="btn btn-success">Send OTP</button>
        </div>

        <div id="otpSection" class="mb-3">
            <label for="otp" class="form-label">Enter OTP</label>
            <input type="text" class="form-control" id="otp" placeholder="6-digit OTP" maxlength="6">
        </div>

        <div class="mb-3 d-grid">
            <button type="button" id="verifyOtpButton" class="btn btn-success">Verify OTP & Register</button>
        </div>
    </form>

    <div id="message" class="text-center text-danger"></div>

    <p class="text-center mt-3">
        Already have an account? <a href="login.html">Login here</a>
    </p>
</div>

<div id="recaptcha-container"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
    import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: 'AIzaSyCkopUkoJjkYPey0BctjdglAiBHQlRPQjo',
        authDomain: 'farm-seva-1c9cd.firebaseapp.com',
        projectId: 'farm-seva-1c9cd',
        storageBucket: 'farm-seva-1c9cd.firebasestorage.app',
        messagingSenderId: '497776728271',
        appId: '1:497776728271:web:025dc1ae4b14164a72ffba',
         measurementId: "G-44DNTWGEE6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let confirmationResult = null;

    const sendOtpButton = document.getElementById('sendOtpButton');
    const verifyOtpButton = document.getElementById('verifyOtpButton');
    const otpSection = document.getElementById('otpSection');
    const messageBox = document.getElementById('message');

    function showMessage(text, isError = true) {
        messageBox.textContent = text;
        messageBox.classList.toggle('text-danger', isError);
        messageBox.classList.toggle('text-success', !isError);
    }

    function resetMessage() {
        messageBox.textContent = '';
    }

    function validatePhone(phone) {
        return /^\+\d{10,15}$/.test(phone);
    }

    function validateAadhaar(aadhaar) {
        return /^\d{12}$/.test(aadhaar);
    }

    function initializeRecaptcha() {
        if (!window.recaptchaVerifier) {
            window.recaptchaVerifier = new RecaptchaVerifier('recaptcha-container', {
                size: 'normal',
                callback: () => {
                    // reCAPTCHA solved; proceed with OTP.
                }
            }, auth);
            window.recaptchaVerifier.render();
        }
    }

    async function sendOtp() {
        resetMessage();
        console.log('Send OTP clicked');

        const name = document.getElementById('name').value.trim();
        let phone = document.getElementById('phone').value.trim();
        const aadhar = document.getElementById('aadhar').value.trim();
        console.log('Form values:', { name, phone, aadhar });

        if (!name || !phone || !aadhar) {
            showMessage('Please fill in all fields.');
            return;
        }

        if (!phone.startsWith('+')) {
            phone = '+91' + phone;
        }

        if (!validatePhone(phone)) {
            showMessage('Enter a valid phone number with country code, e.g. +911234567890.');
            return;
        }

        if (!validateAadhaar(aadhar)) {
            showMessage('Aadhaar number must be exactly 12 digits.');
            return;
        }

        console.log('Initializing reCAPTCHA');
        initializeRecaptcha();
        let verifier = window.recaptchaVerifier;

        try {
            console.log('Calling signInWithPhoneNumber with phone:', phone);
            confirmationResult = await signInWithPhoneNumber(auth, phone, verifier);
            console.log('OTP sent successfully');
            otpSection.style.display = 'block';
            showMessage('OTP sent successfully. Enter the code below.', false);
            sendOtpButton.disabled = true;
        } catch (error) {
            console.error('Error sending OTP:', error);
            showMessage('Failed to send OTP. Check the phone number and Firebase configuration.');
            if (window.recaptchaVerifier) {
                window.recaptchaVerifier.clear();
                window.recaptchaVerifier = null;
            }
        }
    }

    async function verifyOtpAndRegister() {
        resetMessage();

        const name = document.getElementById('name').value.trim();
        let phone = document.getElementById('phone').value.trim();
        const aadhar = document.getElementById('aadhar').value.trim();
        const otp = document.getElementById('otp').value.trim();

        if (!phone.startsWith('+')) {
            phone = '+91' + phone;
        }

        if (!confirmationResult) {
            showMessage('Please send OTP first.');
            return;
        }

        if (!otp || otp.length !== 6) {
            showMessage('Please enter the 6-digit OTP sent to your phone.');
            return;
        }

        try {
            const result = await confirmationResult.confirm(otp);
            const user = result.user;

            await setDoc(doc(db, 'users', user.uid), {
                name,
                phoneNumber: phone,
                aadhar,
                createdAt: new Date().toISOString(),
                uid: user.uid
            });

            localStorage.setItem('currentUser', JSON.stringify({
                uid: user.uid,
                name,
                phoneNumber: phone,
                aadhar
            }));

            showMessage('Registration complete! Redirecting...', false);
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1200);
        } catch (error) {
            console.error('Error verifying OTP:', error);
            showMessage('Invalid OTP or verification failed. Please try again.');
        }
    }

    sendOtpButton.addEventListener('click', sendOtp);
    verifyOtpButton.addEventListener('click', verifyOtpAndRegister);
</script>

</body>
</html>
