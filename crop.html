<!DOCTYPE html>
<html>
<head>
    <title>FarmSeva Crop</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        .navbar {
            background: #2e7d32;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            padding: 20px;
        }

        .welcome {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card button {
            padding: 8px 15px;
            border: none;
            background: #2e7d32;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .card button:hover {
            background: #1b5e20;
        }
    </style>
</head>
<body>
<div class="navbar">
    <h2>🌱 FarmSeva</h2>
    <button onclick="logout()">Logout</button>
</div>
<div class="container">
    <h2>Crop Recommendation</h2>
    <p>Based on your location and soil type, recommended crops:</p>
    <ul>
        <li>Rice - Suitable for monsoon season</li>
        <li>Wheat - Good for winter</li>
        <li>Maize - High yield potential</li>
    </ul>
</div>
<script>
function logout() {
    window.location.href = "login.html";
}
</script>
</body>
</html>
